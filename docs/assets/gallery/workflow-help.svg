<text x="64.00px" y="97.00px" xml:space="preserve"><tspan xml:space="preserve"> </tspan><tspan xml:space="preserve" fill="#59c2ff">✓ New session started                                                                                                                                     </tspan></text><text x="64.00px" y="115.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="133.00px" xml:space="preserve"/><text x="64.00px" y="151.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="169.00px" xml:space="preserve"><tspan xml:space="preserve"> </tspan><tspan xml:space="preserve"/><tspan xml:space="preserve" fill="#59c2ff">[workflow]</tspan><tspan xml:space="preserve">                                                                                                                                                </tspan></text><text x="64.00px" y="187.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="205.00px" xml:space="preserve"><tspan xml:space="preserve"> Workflow — inspectable, model-routed multi-agent work                                                                                                     </tspan></text><text x="64.00px" y="223.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="241.00px" xml:space="preserve"><tspan xml:space="preserve"> Quick start                                                                                                                                               </tspan></text><text x="64.00px" y="259.00px" xml:space="preserve"><tspan xml:space="preserve"> </tspan><tspan xml:space="preserve" fill="#59c2ff">1. /workflow setup                                                                                                                                        </tspan></text><text x="64.00px" y="277.00px" xml:space="preserve"><tspan xml:space="preserve">    Choose Lean, Balanced, Deep, or Custom and review each model route.                                                                                    </tspan></text><text x="64.00px" y="295.00px" xml:space="preserve"><tspan xml:space="preserve"> </tspan><tspan xml:space="preserve" fill="#59c2ff">2. /workflow run &lt;what you want accomplished&gt;                                                                                                             </tspan></text><text x="64.00px" y="313.00px" xml:space="preserve"><tspan xml:space="preserve">    Pi generates the orchestration but does not start it yet.                                                                                              </tspan></text><text x="64.00px" y="331.00px" xml:space="preserve"><tspan xml:space="preserve"> </tspan><tspan xml:space="preserve" fill="#59c2ff">3. Review the complete JavaScript approval screen.                                                                                                        </tspan></text><text x="64.00px" y="349.00px" xml:space="preserve"><tspan xml:space="preserve">    Tab/←/→ switches code and summary · ↑/↓/PgUp/PgDn scrolls · y runs · n/Esc rejects.                                                                    </tspan></text><text x="64.00px" y="367.00px" xml:space="preserve"><tspan xml:space="preserve"> </tspan><tspan xml:space="preserve" fill="#59c2ff">4. /workflow history                                                                                                                                      </tspan></text><text x="64.00px" y="385.00px" xml:space="preserve"><tspan xml:space="preserve">    Open the result, agent evidence, generated script, usage, and export actions.                                                                          </tspan></text><text x="64.00px" y="403.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="421.00px" xml:space="preserve"><tspan xml:space="preserve"> Run and inspect                                                                                                                                           </tspan></text><text x="64.00px" y="439.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow                         open the run browser                                                                                                  </tspan></text><text x="64.00px" y="457.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow run &lt;prompt&gt;            generate, review, and run a workflow                                                                                  </tspan></text><text x="64.00px" y="475.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow saved &lt;name&gt; [json]     review and run saved JavaScript                                                                                       </tspan></text><text x="64.00px" y="493.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow active                  inspect running or paused workflows                                                                                   </tspan></text><text x="64.00px" y="511.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow history                 inspect all project workflow runs                                                                                     </tspan></text><text x="64.00px" y="529.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow status &lt;run-id&gt;         print one run&apos;s status                                                                                                </tspan></text><text x="64.00px" y="547.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="565.00px" xml:space="preserve"><tspan xml:space="preserve"> Configure and control                                                                                                                                     </tspan></text><text x="64.00px" y="583.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow setup                   choose model routes, limits, and approval policy                                                                      </tspan></text><text x="64.00px" y="601.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow settings                show the effective configuration                                                                                      </tspan></text><text x="64.00px" y="619.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow list                    list built-in, personal, and project workflows                                                                        </tspan></text><text x="64.00px" y="637.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow pause|resume|stop &lt;id&gt;  control a live run                                                                                                    </tspan></text><text x="64.00px" y="655.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow remove &lt;id&gt;             delete a persisted run                                                                                                </tspan></text><text x="64.00px" y="673.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="691.00px" xml:space="preserve"><tspan xml:space="preserve"> Verify safely                                                                                                                                             </tspan></text><text x="64.00px" y="709.00px" xml:space="preserve"><tspan xml:space="preserve">   /workflow doctor                  read-only readiness check; no model calls or workflows                                                                </tspan></text><text x="64.00px" y="727.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="745.00px" xml:space="preserve"><tspan xml:space="preserve"> Background results are displayed without waking the parent model. A failed run will not retry or ask for approval again on its own.                       </tspan></text><text x="64.00px" y="763.00px" xml:space="preserve"><tspan xml:space="preserve">                                                                                                                                                           </tspan></text><text x="64.00px" y="781.00px" xml:space="preserve"/><text x="64.00px" y="799.00px" xml:space="preserve"><tspan xml:space="preserve" fill="#1a1f29">──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────